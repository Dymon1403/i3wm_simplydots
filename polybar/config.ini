[colors]
background = ${xrdb:color0:#101012}
background-alt = ${xrdb:color8:#1b1b1f}
foreground = ${xrdb:color7:#e1e1e6}
foreground-alt = ${xrdb:color6:#787880}
primary = ${xrdb:color1:#ffffff}
secondary = ${xrdb:color2:#525259}
alert = ${xrdb:color3:#ff5555}

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 24pt
radius = 10pt
fixed-center = true
offset-x = 15%

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 0
separator = |    
separator-foreground = ${colors.primary}
padding-right = 1
module-margin = 1
font-0 = "Agave Nerd Font Mono:style=Regular:size=11;3"
font-1 = "Agave Nerd Font Mono:style=Regular:size=11;3"

modules-left = datetime
modules-center = i3
modules-right = now-playing media battery monitor

wm-restack = i3
cursor-click = pointer
cursor-scroll = ns-resize

[module/now-playing]
type = custom/script
tail = true
format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.background}
format-padding = 1
exec = playerctl --follow metadata --format "{{ artist }} - {{ title }}" 2>/dev/null || echo "No player active"
click-left = playerctl play-pause
click-right = playerctl next
scroll-up = playerctl next
scroll-down = playerctl previous
label-maxlen = 40

[module/xkeyboard]
type = internal/xkeyboard
format-spacing = 0
label-layout = 󰌌 %name%
label-layout-background = ${colors.background}
label-layout-padding = 1


[module/updates]
type = custom/script
exec = /etc/polybar/config/update.sh
tail = true
interval = 5
format = <label>
format-prefix = " "
label = " %output% "
label-padding = 0
format-prefix-font = 2
label-font = 4
label-alignment = center
label-overline = ${colors.background}
label-underline = ${colors.background}
label-foreground = ${colors.primary}
format-prefix-foreground = ${color.base0A}
format-prefix-underline  = ${color.background}
format-prefix-overline  = ${color.background}
click-left = exec kitty -e sudo pacman -Syyuu


[module/datetime]
type = internal/date
interval = 1.0
date = %a,%b%e
time = %H:%M:%S
label = "%date% %time%"
label-padding = 2
label-font = 7
label-alignment = center

[module/polybar-windows]
type = custom/script
exec =/home/arya/polybar-i3-windows/module.py
tail = true

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-prefix=""
format-prefix-foreground=${colors.primary}
label-mounted =SSD: %free%
label-mounted-foreground=${#ffffff}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground-alt}

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
label-mode-padding = 2
label-mode-foreground = #000
label-mode-background = ${colors.primary}
label-focused = %name%
label-focused-background = ${colors.primary}
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-padding = 2
label-visible = %name%
label-visible-background = ${self.label-focused-background}
label-visible-padding = ${self.label-focused-padding}
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/monitor]
type = internal/monitor
pin-workspaces = true
label-focused = %name%
label-focused-background = #444
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-padding = 2

[bar/left]
monitor = LVDS1
width = 100%

[bar/right]
monitor = VGA1
width = 100%

[module/battery]
type = internal/battery
full-at = 100
low-at = 5

battery = BAT0
adapter = AC0

poll-interval = 5
time-format = %H:%M

format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = "BATT: %percentage%% (%time%)"
label-discharging = "BATT: %percentage%% (%time%)"
label-full ="BATT: %percentage%% (%time%)"
label-low ="BATT: %percentage%% (%time%)"
bar-capacity-width = 10

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.foreground-alt}
label =CPU: %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.foreground-alt}
label =RAM: %gb_free%


[module/network]
type = internal/network
interface = wlp3s0
interface-type = wireless
interval = 3.0
accumulate-stats = true
unknown-as-up = true
format-connected = <ramp-signal> <label-connected>
format-disconnected = <label-disconnected>
label-connected = %essid%
label-connected-foreground = ${colors.foreground}
label-disconnected = 󰞃 DISCONNECTED
label-disconnected-foreground = ${colors.foreground}
ramp-signal-0 = 󰢿
ramp-signal-1 = 󰢼
ramp-signal-2 = 󰢽
ramp-signal-3 = 󰢾
ramp-signal-4 = 󰢾
ramp-signal-5 = 󰢾
animation-packetloss-0 = ⚠
animation-packetloss-0-foreground = #ffa64c
animation-packetloss-1 = 📶
animation-packetloss-1-foreground = #000000
animation-packetloss-framerate = 500
speed-unit = ''

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume> <bar-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

label-muted = " Muted "
label-muted-foreground = ${colors.foreground-alt}
label-muted-background = ${colors.background}

bar-volume-width = 10
bar-volume-foreground-0 = ${colors.foreground}
bar-volume-foreground-1 = ${colors.foreground}
bar-volume-foreground-2 = ${colors.foreground}
bar-volume-foreground-3 = ${colors.foreground}
bar-volume-foreground-4 = ${colors.foreground}
bar-volume-foreground-5 = ${colors.foreground}
bar-volume-foreground-6 = ${colors.foreground}
bar-volume-gradient = false

bar-volume-indicator = |
bar-volume-indicator-font = 2
bar-volume-indicator-foreground = ${colors.foreground}

bar-volume-fill = ─
bar-volume-fill-font = 2

bar-volume-empty = ─
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.secondary}

[module/powermenu]
type = custom/menu

format-foreground = ${colors.foreground}
format-background = ${colors.background}


label-open = "⏻ "
label-open-font = 4
label-close = " "
label-close-foreground = ${colors.foreground}
label-separator = " "
label-separator-foreground = ${colors.foreground}

menu-0-1 = 
menu-0-1-exec = systemctl reboot
menu-0-1-foreground = ${colors.foreground}

menu-0-0 = " "
menu-0-0-exec = systemctl poweroff
menu-0-0-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
compositing-background = source
compositing-overline = over
compositing-underline = over
compositing-foreground = over
compositing-border = over
pseudo-transparency = true

[global/wm]
margin-top = 5
margin-bottom = 5


[bar/duplicate]
monitor = VGA1
width = 100%
height = 37
radius = 4
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
border-size = 6


separator = |    
separator-foreground = ${colors.primary}

padding-right = 1

module-margin-left = 1
module-margin-right = 2

font-0 = DepartureMono Nerd Font Mono:size=10.5;3.5
font-1 = Agave Nerd Font Mono:size=12;2.5

wm-restack = i3
cursor-click = pointer
cursor-scroll = ns-resize
